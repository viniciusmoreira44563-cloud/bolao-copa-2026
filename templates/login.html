{% extends "base.html" %}

{% block content %}

<div class="login-card card">

    <div class="trophy-logo" style="margin:0 auto 18px;">
        🏆
    </div>

    <h2>Entrar no Bolão</h2>

    <p class="muted">
        Digite seu nome e senha. Se for a primeira vez, seu cadastro será criado automaticamente.
    </p>

    <br>

    <form method="post" class="form-line" style="justify-content:center;">
        <input type="text" name="name" placeholder="Seu nome" required>
        <input type="password" name="password" placeholder="Senha" required>

        <button type="submit">
            Entrar
        </button>
    </form>

    <br>

    <a href="/regras" class="btn green">
        Ver regras completas
    </a>

</div>

<div class="card login-card">
    <h2>📋 Regras rápidas</h2>

    <p>🎯 <strong>Placar exato:</strong> 10 pontos</p>
    <p>✅ <strong>Resultado simples:</strong> 5 pontos</p>
    <p>❌ <strong>Erro total:</strong> 0 pontos</p>
</div>

{% endblock %}
