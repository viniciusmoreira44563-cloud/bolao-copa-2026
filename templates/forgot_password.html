{% extends "base.html" %}

{% block content %}

<div class="login-card card">
    <div class="trophy-logo" style="margin:0 auto 18px;">🔐</div>

    <h2>Recuperar senha</h2>

    <p class="muted">
        Digite seu nome de usuário e crie uma nova senha.
    </p>

    <br>

    <form method="post" class="form-column">
        <input type="text" name="name" placeholder="Seu nome de usuário" required>
        <input type="password" name="new_password" placeholder="Nova senha" required>
        <input type="password" name="confirm_password" placeholder="Confirmar nova senha" required>

        <button type="submit">Atualizar senha</button>
    </form>

    <br>

    <a href="/entrar" class="btn green">Voltar para login</a>
</div>

{% endblock %}
